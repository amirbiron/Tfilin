# Render Blueprint - בוט תפילין
# התיעוד הרשמי: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: tefillin-bot
    env: docker
    region: oregon
    plan: starter
    branch: main

    dockerfilePath: ./Dockerfile
    dockerContext: ./

    startCommand: "/app/start.sh"
    healthCheckPath: "/health"
    autoDeploy: true

    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_TIMEZONE
        value: Asia/Jerusalem
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: "/opt/render/project/src"
